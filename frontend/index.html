<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bill Extractor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">⚡ Electricity Bill Extractor</h2>

    <div class="card p-4 shadow">

        <!-- FILE INPUT -->
        <div class="mb-3">
            <label class="form-label">Upload Bill(s)</label>
            <input type="file" class="form-control" id="fileInput" multiple accept=".png,.jpg,.jpeg,.pdf">
        </div>

        <!-- FOLDER INPUT -->
        <div class="mb-3">
            <label class="form-label">OR Select Folder</label>
            <input type="file" class="form-control" id="folderInput" multiple webkitdirectory directory>
        </div>

        <button class="btn btn-primary w-100" onclick="upload()">Extract Data</button>

    </div>

    <div class="mt-4">
        <h5>Results:</h5>
        <pre id="resultBox" class="bg-dark text-white p-3 rounded" style="min-height:150px;"></pre>
    </div>

</div>

<script>
async function upload() {
    const fileInput = document.getElementById("fileInput");
    const folderInput = document.getElementById("folderInput");
    const resultBox = document.getElementById("resultBox");

    console.log("File count:", fileInput.files.length);
    console.log("Folder file count:", folderInput.files.length);

    let formData = new FormData();

    // PRIORITY: folder
    if (folderInput.files.length > 0) {
        resultBox.innerText = `Processing folder (${folderInput.files.length} files)... ⏳`;

        for (let file of folderInput.files) {
            formData.append("files", file);
        }

    } else if (fileInput.files.length > 0) {
        resultBox.innerText = `Processing ${fileInput.files.length} file(s)... ⏳`;

        for (let file of fileInput.files) {
            formData.append("files", file);
        }

    } else {
        resultBox.innerText = "❌ Please select files or a folder.";
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/extract-bill", {
            method: "POST",
            body: formData
        });

        if (!response.ok) {
            throw new Error("Server error: " + response.status);
        }

        const data = await response.json();
        resultBox.innerText = JSON.stringify(data, null, 2);

    } catch (error) {
        console.error(error);
        resultBox.innerText = "❌ Failed to connect to backend.\n\n" + error;
    }
}
</script>

</body>
</html>
